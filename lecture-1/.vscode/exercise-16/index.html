<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
        let a = parseInt(prompt("enter the a ="));
        let b = parseInt(prompt("enter the b ="));
        let c = parseInt(prompt("enter the c ="));
        let d = parseInt(prompt("enter the d ="));
        let e = parseInt(prompt("enter the e ="));
        
        if(a > b && a >c && a > d){
          document.write(`a is big`);
        }
        else if(b > c && b > d){
            document.write(`b is big`);
        }
        else if(c > d && c > e){
            document.write(`c is big`);
        }
        else if(d > e){
            document.write(`d is big`);
        }
        else{
            document.write(`e is big`);
        }
    </script>
