<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("enter the no ="));

        if(n == 0){
            document.write("no is zero");
        }
        else if(n > 0){
            document.write("no is positive");
        }
        else{
            document.write("no is negative");
        }
    </script>
</body>
</html>
