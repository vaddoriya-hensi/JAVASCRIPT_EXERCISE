<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>

    <script>
        let a = parseInt(prompt('enter the value a='));
        let b = parseInt(prompt('enter the value b='));


        document.write(`sum is = ${a + b}`);
        document.write("<br>");
        document.write(`sub is = ${a - b}`);
        document.write("<br>");
        document.write(`multi is = ${a * b}`);
         document.write("<br>");
        document.write(`div is = ${a / b}`);
    </script>
</body>

</html>
