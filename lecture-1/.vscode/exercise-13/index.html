<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <script>
        let year = parseInt(prompt("enter the year ="));

        if(year % 4 == 0){
            document.write("year is leap year");
        }
        else{
            document.write("year is not leap year");
        }
    </script>
</body>
</html>
